<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <fieldset>
        <legend>회원 가입</legend>
        <!-- input 태그의 속성이 text이다! (inlin속성) -->
        <!-- label => 아이디 텍스트를 누르면 활성화 -->
        <!-- autofocus 최초 포커스 활성화 -->
        <div>
            <label>
                아이디 : <input type="text" autofocus placeholder="아이디 입력하셈">
            </label>
            <input type="button" value="중복체크">
        </div>
        <div>
            <label>
                비밀번호 : <input type="password" placeholder="비번 입력하셈">
            </label>
        </div>
        <div>
            성별 : 
            <label> <input type="radio" name="gender" checked> 남자 </label>
            <label> <input type="radio" name="gender"> 여자 </label>
        </div>
        <div>
            취미 :
            <label><input type="checkbox" name="hobby" checked>코딩<label>
            <label><input type="checkbox" name="hobby">독서<label>
            <label><input type="checkbox" name="hobby">운동<label>
            <label><input type="checkbox" name="hobby">유튜브 시청<label>
            <label><input type="checkbox" name="hobby">게임<label>   
        </div>
        <div>
            이미지 첨부 :
            <input type="file">
        </div>
        <div>
            생년월일
            <input type="date">
        </div>
        <div>
            나이대 :
            <select>
                <option> :: 선택 :: </option>
                <option>10대</option>
                <option>20대</option>
                <option>30대</option>
                <option>40대</option>
                <option>50대 이상</option>
            </select>
        </div>
        <div>
            자기소개 :
            <div><textarea rows="5" cols="20" placeholder="자기소개입력하셈"></textarea></div>
        </div>
        <div>
            <button>가입하기</button>
            <button>취소</button>
        </div>
    </fieldset>
</body>
</html>
