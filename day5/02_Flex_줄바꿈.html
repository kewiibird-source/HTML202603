<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex wrap</title>
    <style>
        #container {
            border: 2px solid black;
            background-color: #eee;
            display: flex;
            justify-content: row;
        }
        .box {
            width: 100px;
            margin: 5px;
            padding: 10px 20px;
            background-color: darkseagreen;
            text-align: center;
        }
        .wrap1 {
            /* nowrap 디폴트값, 무조건 한줄에 표시 */
            flex-wrap: nowrap;
        }
        .wrap2 {
            /* wrap 화면이 줄어들때 여러줄에 표시 */
            flex-wrap: wrap;
        }
        .wrap3 {
            /* wrap 화면이 줄어들때 여러줄에 표시, 거꾸로 */
            flex-wrap: wrap-reverse;
        }
    </style>
</head>
<body>
    <div id="container" class="wrap3">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
    </div>
</body>
</html>
