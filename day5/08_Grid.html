<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #container {
            /* width: 800px; */
            display: grid;
            border: 1px solid #ccc;
            box-sizing: border-box;
            /* auto-fit */
            /* 전체 크기에 맞춰서 요소들로 꽉 채움 */
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            /* auto-fill */
            /* 최소 크기에 맞춰서 채움, 빈공간을 안채움 */
            /* grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); */
            gap: 10px 20px;
        }
        .box {
            border: 1px solid black;
            padding: 5px 10px;
            font-size: 15px;
            text-align: center;
        }
        .box:nth-child(2n+1) { 
            background-color: lightblue;
        }
    </style>
</head>
<body>
    <div id="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>

    </div>
</body>
</html>
