<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>04_perspective</title>
    <style>
        body {
            background-color: #e0e0e0;
        }
        #container {
            width: 800px;
            margin: 100px auto;
        }

        .border-box {
            width: 200px;
            height: 200px;
            border: 2px dashed #ccc;
        }
        .box {
            width: 100%;
            height: 100%;
            background-color: #a3ffd9a1;
            border-radius: 10px;
            color: crimson;
            text-align: center;
            line-height: 100px;   
        }
        @keyframes spin {
            0%{transform: rotateY(0deg);}
            100%{transform: rotateY(360deg);}
        }
        .perspective1 {
            perspective: none;
            /* 디폴트 */
        }
        .perspective2 {
            perspective: 500px;
            /* 사용자와 모니터 사이의 거리 */
        }

        
        /* .perspective3 {
            perspective : 400px;
        }
        .perspective3 .box {
            transition: transform 1s ease;
        }
        .perspective3:hover {
            transform: rotateX(70deg);
        } */

        .perspective3 {
            perspective: 400px;
        }
        .perspective3 .box {
            transition: transform 1s ease; 
        }
        .perspective3:hover .box { 
            transform: rotateX(70deg); 
        }
    </style>
</head>
<body>
    <div id="container">
        <div class="border-box perspective3">
            <div class="box">perspective3</div>
        </div>
    </div>
</body>
</html>
