            text-align: center;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <th>이름</th>
            <th>자바</th>

        </tr>
        <tr>
            <td>홍길동</td>
            <td>85</td>
            <td>90</td>
            <td>95</td>
        </tr>
        <tr>
            <td>김철수</td>

            <td>98</td>
        </tr>
    </table>
</body>
</html>
