<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 이미지 출력 img 태그 / 영상 출력 video 태그-->
    <!-- css 적용하지 않고 간단하게 크기 지정하기 -->
    <!-- <img src="../media/tom1.jpg" width="300" height="430"> -->
    <a href="https://www.naver.com/" target="_blank">
        <img src="../media/tom1.jpg" width="300" height="430">
    </a>
    <!-- onclic 클릭했을때 실행 alert 알림창! -->
    <!-- href="" 가 빈값이면 알림창 실행 후 새로고침 됨 -->
    <!-- a href의 #은 최상단으로 올라가짐 -->
    <a href="javascript:;" onclick="alert('hehehehehe!')">
        <img src="../media/tom1.jpg" width="300" height="430">
    </a>
    <hr>
    <video src="../media/flower.mp4" controls loop muted></video>

</body>
</html>
