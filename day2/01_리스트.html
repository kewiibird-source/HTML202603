<!DOCTYPE html>
<html lang="kr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 목록화 할 때 사용하는 태그 ol, ul -->
        <!-- ul태그는 순서가 없는 목록 태그 -->
        <ul>
            <li>야호</li>
            <li>야</li>
            <li>호</li>
        </ul>
        <hr>
        <!-- ol태그는 순서가 있는 목록 태그 order list -->
        <ol>
            <li>야호</li>
            <li>야호2</li>
            <li>야호3</li>
        </ol>
        <hr>
        <!-- 기본 타입은 1,2,3 / reversed 역순 -->
        <ol type="A" reversed>
            <li>야호</li>
            <li>야호2</li>
            <li>야호3</li>
        </ol>
</body>
</html>
