<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <style>
        div {
            color: green;
        }
        /* id로 스타일을 줄때 */
        #title {
            font-weight: bold;
            font-size: 30px;
            color: brown;
        }
        /* class로 스타일을 줄때 */
        .subject {
            font-style: italic;
        }
        .core {
            text-decoration: underline;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <!-- 2번 -->
    <!-- 1,2번 공통 태그이름, id, class명 등을 통해서 스타일 부여-->
    <!-- id는 #, 중복불가 / class는 ., 중복가능, 클래스명을 두개 이상 넣을 수 있음! -->
    <div id="title">안녕하세요. 과목목록 입니다.</div>
    <hr>
    <div class="subject core">자바</div>
    <div class="subject">오라클</div>
    <div class="subject">HTML</div>
    <div class="subject core">javascript</div>
    <div class="subject">flutter</div>
</body>
</html>
