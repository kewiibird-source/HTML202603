<!DOCTYPE html>
<html lang="kr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* body {
            background: linear-gradient(rgba(255, 255, 255, 0.432) rgba(255, 250, 250, 0.411))
        } */
        div {
            /* border: 1px solid black; */
            box-sizing: border-box;
        }
        #container {
            margin: 30px auto;
            width: 700px;
            height: 700px;
            border: 1px solid #eeeeee75;
            border-radius: 30px;
            box-shadow: 20px 30px 15px #dedede;
            
        }
        #side {
            width: 250px;
            height: 698px;
            border-radius: 30px;
            float: left;
            position: relative;
            background-color: #fff;
            text-align: center;
        }
        #sideInfo {
            width: 200px;
            height: 400px;
            background-color: #dedede23;
            border-radius: 10px;
            position: absolute;
            left: 25px;
            top: 210px;
            text-align: center;
        }
        #main {
            width: 447px;
            height: 698px;
            /* border: 1px solid black; */
            float: left;
            position: relative;
        }
        #img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            float: left;
            background-image: url(../media/m1.png);
            background-size: cover;
            position: absolute;
            top: 35px;
            left: 48px;
            box-shadow: -5px 5px 20px #ebebebcc;
            background-color: rgba(245, 245, 245, 0.719);
        }
        #img:hover {
            background-image: url(../media/m2.png);
            background-size: cover;
        }
        #time {
         font-size: 15px;
         /* font-weight: bold; */
         color: black;
         text-align: center;
         position: absolute;
         left: 55px;
         bottom: 50px;
        }
        
    </style>
</head>
<body>
    <div id="container">
        <div id="side">
            <div id="img"></div>
            <div id="sideInfo">
                <h1>Hong Gildong</h1>    
                <p>🌎 Incheon, Korea</p>
                <p>💻 test01@naver.com</p>
                <h2><a href="https://github.com/kewiibird-source">GitHub</a></h2>
                <div id="time"></div>
            </div>
            
        </div>
        <div id="main">
            <p>자기소개</p>
        </div>
    </div>
</body>
</html>
<script>
    setInterval(()=>{
        let datetime = new Date();
        let obj = document.querySelector("#time");
        let second = datetime.getSeconds() < 10 ? "0" + datetime.getSeconds() : datetime.getSeconds();
        let minutes = datetime.getMinutes() < 10 ? "0" + datetime.getMinutes() : datetime.getMinutes();
        // let time = datetime.getHours() + ":" + minutes + ":" + second;
        obj.innerHTML = "" + datetime.getHours() + "시" + minutes + "분" + second + "초" ;
    }, 1000);
</script>
