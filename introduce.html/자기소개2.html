    <style>
        body {
            background-color: white;
            display: flex;
            justify-content: center;
            /* 외부폰트설정 */
            font-family: "Noto Serif KR", serif;
            font-optical-sizing: auto;
            font-weight: 500;
            font-style: normal;
            border-right: 3px solid #000;
        }
        #app {
            display: contents;
            /* 디자인무시, 박스영역무시! */
        }
        /* 컨테이너 영역 나누기 */
        #container {
            margin: 0px 30px;
            width: 100%;
            height: 100vh;
            border: none;
            box-sizing: border-box;

            display: grid;
            /* gap: 10px; */
            grid-template-rows: 150px minmax(600px,auto);
            grid-template-areas: 
            "header"
            "content";
        }
        .header {grid-area: header;}
        .content {grid-area: content;}

        /* 헤더영역 */
        .header {
            /* 배경색, 탑모서리둥글게 */
            background-color: #ffebcdab;

            padding: 20px;

            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #h-menu {
            display: flex;
        }

        /* 컨텐츠영역 */
        .content {
            /* 배경색, 바텀모서리둥글게 */
            background-color: #556b2f77; 
            border-bottom-left-radius: 30px;             
            border-bottom-right-radius: 30px;

            padding: 20px;
        }
        #h-menu {
            font-size: 60px;
            padding: 10px;
        }
        
    </style>
</head>

    </div>
