<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전체 장비 — 모닥모닥</title>

<!-- 기존 CSS 그대로 유지 -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">

<!-- (중간 CSS 생략 - 기존 그대로 유지하면 됨) -->
</head>

<body>
<div id="app">

<!-- 👉 기존 NAV / 필터 / 레이아웃 전부 그대로 유지 -->

<!-- 🔥 PRODUCT GRID (여기만 Vue 적용) -->
<div class="product-grid">
  <div class="pcard" v-for="item in list" :key="item.productId">

    <div class="pcard-img">
      <span class="pcard-emoji">⛺</span>
    </div>

    <div class="pcard-body">
      <div class="pcard-cat">
        {{ item.categoryId }}
      </div>

      <div class="pcard-name">
        {{ item.productName }}
      </div>

      <div class="price-row">
        <span class="price-main">
          {{ item.price }}원
        </span>
        <span class="price-unit">/ 1박</span>
      </div>

      <div class="btn-row">
        <button>대여하기</button>
        <button>구매하기</button>
      </div>
    </div>

  </div>
</div>

</div>

<!-- ✅ 필수 라이브러리 -->
<script src="https://code.jquery.com/jquery-3.7.1.js"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

<!-- 🔥 Vue + AJAX -->
<script>
const app = Vue.createApp({
    data() {
        return {
            list: []
        };
    },
    methods: {
        fnList() {
            let self = this;

            $.ajax({
                url: "http://localhost:8080/product/list.dox",   // 🔥 수정됨 (이게 중요)
                type: "POST",
                dataType: "json",
                data: {},
                success: function (data) {
                    console.log(data);
                    self.list = data.list;
                },
                error: function () {
                    alert("데이터 불러오기 실패");
                }
            });
        }
    },
    mounted() {
        this.fnList();
    }
});

app.mount("#app");
</script>
</body>
</html>
