<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        img {
            float: left;
        }
        
    </style>
</head>
<body>
    <img src="../media/망곰이1.png" alt="망곰이" width="230px" height="250px">
    <!-- img 속성중 alt는 사진이 뜨지 않을때 사진에 대한 설명을 띄워줄 수 있음 -->
     <div>안녕? 망곰이야!</div>
     <div>망곰 망곰 망곰 망곰</div>
    <!-- BFC(Block Formatting Context) -->
    <!-- div 박스는 float과 겹쳐지지만 -->
    <!-- 텍스트 라인은 float를 피해서 배치 -->
</body>
</html>
