<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #container {
            width: 500px;
            margin: 10px auto;
        }
        .txt {
            color: violet;
            color: rgb(192, 0, 0);
            color: #612eaf;
            /* # 16진수 0 1 2 3 .. 9 .. a b c d e f */
            font-size: smaller;
            font-weight: bold;
            font-style: italic;
            text-decoration: underline;
            text-align: center;
            text-shadow: 3px 3px 3px forestgreen;
        }
        .box1 {
            border: 2px solid black;
            width: 200px;
            height: 200px;
            background-color: antiquewhite;
            border-radius: 10%;
        }
        .box2 {
            width: 600px;
            background-color: green;
            color: white;
            text-align: center;
            padding: 20px 0px;
        }
        .temp1 {
            border: 2px solid black;
            /* span 태그는 인라인 속성이라 크기값을 지정해도 안먹음 */
            width: 200px;
            height: 200px;
        }
    </style>
</head>
<body>
    <div id="container">
        <!-- text css 속성 -->
         <div class="txt">안녕하시구리</div>
    </div>
    <hr>
    <div class="box1"></div>
    <br>
    <div class="box2">
        HTML JAVASCRIPT
    </div>
    <hr>
    <!-- <span class="temp1">span태크!!</span> -->
</body>
</html>
