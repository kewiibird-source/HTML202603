<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            width: 200px;
            height: 200px;
            margin: 5px;
        }
        .gold{background-color: gold; float: left;}
        .orangered{background-color: orangered; float: left;}
        .black{background-color: black; float: right;}
        .blue{background-color: blue; clear: both;}
        .line{background-color: green; height: 50px;}
    </style>
</head>
<body>
    <div class="box gold"></div>
    <div class="box orangered"></div>
    <div class="line"></div>
    <div class="box blue"></div>
    <div class="box black"></div>
</body>
</html>
