<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제품목록(체크박스삭제버튼)</title>
    <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<style>
    table, th, tr, td {
        border: 1px solid black;
        padding: 10px 20px;
        text-align: center;
        border-collapse: collapse;
    }
    .search-area {
        margin: 10px;
    }
    .search-input {
        outline: none;
        /* border: none; 외형선 없애는거*/
    }
    .search-area select {
        margin-left: 5px;
    }
</style>
<body>
    <div id="app">
        <div id="container">
            <div class="search-area">
                검색어 : <input class="search-input" v-model="keyword" @keyup.enter="fnList">
                <button @click="fnList">검색</button>
                <select v-model="brand" @change="fnList">
                    <option value="">:: 선택 ::</option>
                    <option value="삼성">삼성</option>
                    <option value="애플">애플</option>
                    <option value="LG">LG</option>
                    <option value="소니">소니</option>
                    <option value="마이크로소프트">마이크로소프트</option>
                    <option value="닌텐도">닌텐도</option>
                    <option value="다이슨">다이슨</option>
                </select>
            </div>
            <div id="product-table">
                <table>
                    <tr>
                        <th><input type="checkbox" @change="fnAllcheck"></th> <!-- 전체선택, 해제 -->
                        <th>제품번호</th>
                        <th>제품명</th>
                        <th>브랜드명</th>
                        <th>가격</th>
                        <th>출시일</th>
                        <th>삭제</th>
                    </tr>
                    <tr v-for="item in list"> <!-- vue 반복문!! -->
                        <td><input type="checkbox" v-model="productIdList" :value="item.PRODUCT_ID" name="product"></td>
                        <!-- :value 변수에 있는값을 가져다 쓸떄! -->
                        <td>{{item.PRODUCT_ID}}</td>
                        <td>{{item.PRODUCT_NAME}}</td>
                        <td>{{item.BRAND}}</td>
                        <td>{{item.PRICE}}</td>
                        <td>{{item.RELEASE}}</td>
                        <td><button @click="fnBtnRemove(item.PRODUCT_ID)">삭제</button></td>
                    </tr>
                    <tr v-if="list.length == 0">
                        <td colspan="7">등록된 제품이 없습니다.（＞人＜；）</td>
                    </tr>
                </table>
                <div>
                    <button @click="fnremove">삭제</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
<script>
    const app = Vue.createApp({
        data() {
            return {
                // 변수 - (key : value)
                list : [],
                keyword : "", // 검색창
                brand : "",
                productIdList : [], // 체크박스 옵션이라 여러값을 담기위해 리스트형태로
                checkFlg : false
            };
        },
        methods: {
            // 함수(메소드) - (key : function())
            fnList : function() {
                let self = this;
                $.ajax({
                    url: "http://192.168.30.57:3009/product/list",
                    dataType: "json",
                    type: "GET",
                    data: {keyword : self.keyword, brand : self.brand},
                    success: function (data) {
                        console.log(data);
                        self.list = data.productList;
                    }
                });
            },
            fnremove : function(){
                let self = this;
                // console.log(self.productIdList);
                if(!confirm("정말삭제?")){
                    return;
                }
                $.ajax({
                    url: "http://192.168.30.57:3009/product/delete-list",
                    dataType: "json",
                    type: "GET",
                    traditional : true,
                    data: {productIdList : self.productIdList}, 
                    success: function (data) {
                        self.fnList();
                    }
                });
            },
            fnBtnRemove : function(pId){
                let self = this;
                console.log(pId);
                if(!confirm("정말삭제?(ノω<。)ノ))☆.。")){
                    return;
                }
                $.ajax({
                    url: "http://192.168.30.57:3009/product/delete",
                    dataType: "json",
                    type: "GET",
                    data: {productId : pId}, // 인자값으로 있는 pId를 productId로 보낸다
                    success: function (data) {
                        self.fnList();
                    }
                });
            },
            fnAllcheck : function(){
                let self = this;
                if(self.productIdList.length != 0){
                    self.productIdList = [];
                } else {
                    self.productIdList = [];
                    for(let i=0; i<self.list.length; i++){
                    self.productIdList.push(self.list[i].PRODUCT_ID); // push() 안에 있는 내용을 순차적으로 리스트에 넣을수있음
                    }
                }
                
            }
        }, // methods
        mounted() {
            // 처음 시작할 때 실행되는 부분
            let self = this;
            self.fnList();
        }
    });

    app.mount('#app');
</script>
