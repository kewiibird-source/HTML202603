<!DOCTYPE html>
<html lang="kr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>첫번째 실습!</title>
</head>
<body>
    <!-- pre태그와 &nbsp;는 작성한 그대로 출력되지만 -->
    <!-- 사용을 권장하지 않는다! -->
    <pre>
     안녕하세요~ ^^
                왕
    </pre>
     test &nbsp; test
    <!-- hr 선긋기 -->
    <hr>
    <!-- h태그도 block 속성 -->
    <!-- 글씨 크기가 크고, 볼드체. 제목에 많이쓰인다. -->
    <h1>htmlL</h1>
    <h2>htmlL</h2>
    <h3>htmlL</h3>
    <h6>htmlL</h6>
    <!-- h6까지 있다! -->
    <hr>
    <!-- ★ div, span ★ -->
    <!-- div는 한줄을 다 차지함(block 속성) -->
    <!-- span 태그는 자기 텍스트 크기만큼 차지함(inline 속성) -->
    <div>안녕하세요!</div>
    <div>html 재밌죠?</div>
    <span>안녕하세요!</span>
    <span>html 노잼</span>
    <hr>
    <!-- b, strong -->
     <div>
        <b>b태그!</b>
     </div>
     <br>
     <div>
        <strong>strong태그!</strong>
     </div>
    <hr>
    <!-- i, em 이테릭체 -->
     <div>
        <i>i태그!</i>
     </div>
     <div>
        <em>em태그!</em>
     </div>
     <hr>
    <!-- mark 강조하는 태그, 색이 정해져있어서 css로 대체하는게 좋음 -->
     <div>
        <mark>mark태그!</mark>
     </div>
    <!-- small css태그로 크기를 세분화 가능! -->
     <div>
        <small>small태그!</small>
     </div>
     <hr>
     <div>
        <span style="font-size: 50px;">뮈엥</span>
     </div>
     <hr>
     <!-- sup, sub 위첨자, 아래첨자 -->
    <div>
        <div>
            HTML<sup>재밌다!</sup>
        </div>
    </div>
    <div>
        <div>
            HTML<sub>재밌다!</sub>
        </div>
    </div>
    <hr>
     <!-- del, ins 삭제선, 밑줄 --> 
    <div>
        html<del>재밌다!</del>
    </div>
    <div>
        html<ins>재밌다!</ins>
    </div>
</body>
</html>
