<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body {
            background-color: #eeeeee9f;
            box-sizing: border-box;
        }
        #container {
            border: 1px solid #eee;
            margin: 100px auto;
            width: 450px;
            height: 730px;
            border-radius: 20px;
            background-color: white;
            text-align: center;
            padding: 30px;
            box-sizing: border-box;
            position: relative;
        }
        #txtContainer {
            top: 125px;
        }
        h2, p, span {
            margin: 13px 10px;
        }
        p{
            color: rgb(100, 100, 100);
            text-align: left;
            /* font-weight: bold; */
            font-size: small;
            margin-bottom: 0px;
        }
        h2 {
            margin-bottom: 3px;
        }
        #txt1 {
            text-align: center;
            font-weight: normal;
            font-size: medium;
            color: #c0c0c0;
            margin-top: 0px;
            display: inline-block;
        }
        span {
            color: rgb(204, 204, 204);
        }
        #inputbox {
            padding: 18px;
            border-radius: 10px;
            border: 1.8px solid #eee;
            width: 300px;
            margin: 10px 15px;
            font-size: 15px;
        }
        #idbox {
            padding: 18px;
            border-radius: 10px;
            border: 1.8px solid #eee;
            width: 235px;
            margin: 10px 15px;
            font-size: 15px;
        }
        #join {
            /* 아이디중복확인 했을때 중복된 아이디일때 */
            border-radius: 10px;
            border: 0px solid #fff;
            background-color: rgb(80, 156, 243);
            color: white;
            padding: 15px;
            width: 340px;
            margin: 20px 15px;
        }
        #join-false { 
            /* 아이디중복확인 했을때 사용가능일때 */
            border-radius: 10px;
            border: 0px solid #fff;
            /* background-color: rgb(80, 156, 243); */
            color: rgb(110, 110, 110);
            padding: 15px;
            width: 340px;
            margin: 20px 15px;
        }
        /* #join:hover {
            background-color: rgb(72, 133, 202);
            pointer-events: visible;
        } */
        #login {
            color: rgb(80, 156, 243);
            /* margin-left: 0px; */
        }
        .warring-area {
            height: 12px;   
            text-align: left;
        }
        .warring-txt {
            color: red;
            font-size: 12px;
            margin: 2px 5px;
            text-align: left;
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="container">
            <div>
                <h2>회원가입</h2>
                <p id="txt1">새로운 계정을 만들어 서비스를 시작하세요.</p>
            </div>
            <div id="txtContainer">
                <p>이름</p>
                    <input type="text" v-model="name" placeholder="홍길동" id="inputbox">
                <p>아이디</p>
                    <input type="text" v-if="!result" placeholder="아이디를 입력해주세요." id="idbox" v-model="userId">
                    <input type="text" v-else disabled placeholder="아이디를 입력해주세요." id="idbox" v-model="userId">
                    <button @click="fnCheck">중복체크</button> <!-- 중복체크 -->
                <p>비밀번호</p>
                    <input type="password" v-model="pwd1" placeholder="4자 이상 입력" id="inputbox">
                    <div class="warring-area">
                        <span v-if="pwd1.length < 4 && pwd1 != ''" class="warring-txt">
                            * 비밀번호4글자이상
                        </span>
                    </div>
                <p>비밀번호 확인</p>
                    <input type="password" v-model="pwd2" placeholder="비밀번호를 다시 입력하세요" id="inputbox">
                    <div class="warring-area">
                        <span class="warring-txt" v-if="pwd1 != pwd2">
                            * 비밀번호 일치하지 않음
                        </span>
                    </div>
                <button id="join" v-if="result" @click="fnSignup">가입하기</button>
                <button id="join-false" v-else disabled>가입하기</button>
                <div id="txt1">이미 계정이 있으신가요?</div>
                <span id="login"><a href="login.html">로그인</a></span>
            </div>
        </div>
    </div>
</body>
</html>
<script>
    const app = Vue.createApp({
        data() {
            return {
                // 변수 - (key : value)
                userId : "",
                result : false,
                name : "",
                pwd1 : "",
                pwd2 : ""
            };
        },
        methods: {
            // 함수(메소드) - (key : function())
            fnCheck: function () {
                let self = this; // ajax 안에서 this 사용은 권장하지 않음!
                
                // userId로 서버에 체크하기전에 4자리가 넘는지 확인
                if(self.userId.lenght < 4){
                    alert("아이디는 4글자 이상");
                    return;
                }

                let param = {
                    userId : self.userId
                };
                $.ajax({
                    url: "http://192.168.30.57:3009/id-check",
                    dataType: "json",
                    type: "GET",
                    data : param,
                    // data: {userId : self.userId}, 
                    success: function (data) {
                        alert(data.message);
                        self.result = data.success;
                    }
                });
            }, // fnCheck 끝

            fnSignup: function(){
                let self = this;

                if(self.pwd1.length < 4){
                    alert("비밀번호 4글자 이상!");
                    return;
                }
                if(self.pwd1 != self.pwd2){
                    alert("비밀번호 확인하삼");
                    return;
                }

                let param = {
                    userId : self.userId,
                    name : self.name,
                    pwd : self.pwd1, 
                    // 우리가 갖고있는 데이터는 임의의 이름으로 서버에서 받기로한(보내주기로한) 이름은 정해진대로! 
                };

                $.ajax({
                    url: "http://192.168.30.57:3009/add",
                    dataType: "json",
                    type: "GET",
                    data : param,
                    success: function (data) {
                        location.href="login.html"
                    }
                });
            }
            
        }, // methods
        mounted() {
            // 처음 시작할 때 실행되는 부분
        }
    });

    app.mount('#app');
</script>
