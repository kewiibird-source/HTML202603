        .top-menu {
            display: inline-block;
        }
        .main {
            background-color: rgb(114, 143, 63);
            color: #fff;
            font-weight: bold;
            width: 150px;
            padding: 10px;
            box-sizing: border-box;
            cursor: pointer; /* 마우스 가져가면 마우스 포인터 모양이 바뀜 */
        }
        .sub {
            background-color: rgba(166, 219, 74, 0.26);
            width: 150px;
            display: none;
        }
        .sub a {
            padding: 10px;
            box-sizing: border-box;
            display: block;
            cursor: pointer;
        }
        .top-menu:hover .sub {
            display: block;
        }
        .sub a:hover {
            background-color: rgba(176, 214, 110, 0.55);
        }
    </style>
</head>
<body>

    <div class="top-menu">
        <div class="main">Dropdown</div>
        <div class="sub">
            <a>Menu1</a>
            <a>Menu2</a>
            <a>Menu3</a>
