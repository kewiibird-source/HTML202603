<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반복그라데이션</title>
    <style>
        div {
            width: 600px;
            height: 400px;
        }
        .grad1 {
            /* 반복그라데이션 */
            background: blue;
            background: repeating-linear-gradient(orange, red 50px);
        }
        .grad2 {
            /* 반복그라데이션 */
            background: blue;
            background: repeating-radial-gradient(rgb(246, 148, 255),white 10%);
        }
    </style>
</head>
<body>
    <div class="grad1"></div>
</body>
</html>
